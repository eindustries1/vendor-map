<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: pan-x pan-y;
      pointer-events: auto !important;
    }

    .gm-style, .gm-style * {
      pointer-events: auto !important;
      touch-action: auto !important;
    }

    body * {
      pointer-events: auto !important;
    }
  </style>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDsMam71vV_dCRGnMYj6JTlQBjzSmmf8EY"></script>
</head>

<body>
  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 18.15, lng: -65.45 },
        zoom: 12,
        gestureHandling: "greedy",
        fullscreenControl: false,
        streetViewControl: false,
        mapTypeControl: false
      });
    }

    function addVendorMarkers(vendors = [], userLocation = null) {
      vendors.forEach(v => {
        if (typeof v.lat !== "number" || typeof v.lng !== "number") return;

        const marker = new google.maps.Marker({
          position: { lat: v.lat, lng: v.lng },
          map,
          title: v.title || ""
        });

        // ⭐ Create a REAL DOM element for the InfoWindow
        const container = document.createElement("div");
        container.style.maxWidth = "220px";
        container.style.fontFamily = "sans-serif";

        container.innerHTML = `
          <h3 style="margin:0 0 6px;">${v.title || ""}</h3>
          <p style="margin:0 0 8px;font-size:13px;">${v.addressText || ""}</p>
          <button class="dirBtn" 
            style="padding:6px 10px;font-size:13px;cursor:pointer;">
            Get Directions
          </button>
        `;

        const infoWindow = new google.maps.InfoWindow({
          content: container
        });

        marker.addListener("click", () => {
          infoWindow.open(map, marker);

          google.maps.event.addListenerOnce(infoWindow, "domready", () => {
            const btn = container.querySelector(".dirBtn");

            if (btn) {
              btn.onclick = () => {
                const origin = userLocation
                  ? `${userLocation.lat},${userLocation.lng}`
                  : "Current+Location";

                const dest = `${v.lat},${v.lng}`;

                const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}`;
                window.open(url, "_blank");
              };
            }
          });
        });
      });
    }

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "initMap") return;

      addVendorMarkers(data.vendors || [], data.userLocation || null);
    });

    window.onload = initMap;
  </script>
</body>
</html>
