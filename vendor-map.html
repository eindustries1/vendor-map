<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    :host {
      display: block;
      width: 100%;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDsMam71vV_dCRGnMYj6JTlQBjzSmmf8EY"></script>
</head>

<body>

<script>
class VendorMap extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: "open" });

    // Create map container inside the shadow DOM
    const mapDiv = document.createElement("div");
    mapDiv.id = "map";
    this.shadowRoot.appendChild(mapDiv);
  }

  connectedCallback() {
    this.initMap();
  }

  initMap() {
    const center = { lat: 18.15, lng: -65.45 };

    new google.maps.Map(this.shadowRoot.getElementById("map"), {
      center,
      zoom: 12,
      gestureHandling: "greedy",
      fullscreenControl: false,
      streetViewControl: false,
      mapTypeControl: false
    });
  }
}

customElements.define("vendor-map", VendorMap);
</script>

</body>
</html>
