<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: pan-x pan-y; /* one-finger pan */
    }
    .gm-style img { max-width: none; }
  </style>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDsMam71vV_dCRGnMYj6JTlQBjzSmmf8EY"></script>
</head>

<body>
  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 18.15, lng: -65.45 },
        zoom: 12,
        gestureHandling: "greedy",
        fullscreenControl: false,
        streetViewControl: false,
        mapTypeControl: false
      });
    }

    window.onload = initMap;
  </script>
</body>
</html>
