<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: pan-x pan-y; /* one-finger pan */
    }
    .gm-style img { max-width: none; }
  </style>

  <!-- Google Maps JS API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDsMam71vV_dCRGnMYj6JTlQBjzSmmf8EY"></script>
</head>

<body>
  <div id="map"></div>

  <script>
    let map;

    // Initialize the map with a default center
    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 18.15, lng: -65.45 },
        zoom: 12,
        gestureHandling: "greedy",
        fullscreenControl: false,
        streetViewControl: false,
        mapTypeControl: false
      });
    }

    // Add vendor markers from data sent by Wix
    function addVendorMarkers(vendors = []) {
      console.log("Vendors received in iframe:", vendors);

      vendors.forEach(v => {
        // Ensure valid numeric coordinates
        if (typeof v.lat !== "number" || typeof v.lng !== "number") {
          return;
        }

        new google.maps.Marker({
          position: { lat: v.lat, lng: v.lng },
          map,
          title: v.title || ""
        });
      });
    }

    // Listen for messages from the Wix page (iframe.postMessage)
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "initMap") return;

      console.log("Message received in iframe:", data);

      // Add vendor markers (ignore userLocation for now)
      addVendorMarkers(data.vendors || []);
    });

    // Make sure map is ready before any markers are added
    window.onload = initMap;
  </script>
</body>
</html>
