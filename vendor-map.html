<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>

  <!-- Your Google Maps API key -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDsMam71vV_dCRGnMYj6JTlQBjzSmmf8EY"></script>
</head>

<body>
  <div id="map"></div>

  <script>
    function initMap() {
      const center = { lat: 18.15, lng: -65.45 }; // Vieques center

      const map = new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 12,
        gestureHandling: "greedy",
        fullscreenControl: false,
        streetViewControl: false,
        mapTypeControl: false
      });

      // Example marker
      new google.maps.Marker({
        position: center,
        map,
        title: "Vieques"
      });
    }

    window.onload = initMap;
  </script>
</body>
</html>
